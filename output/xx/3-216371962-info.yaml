pretrained_model: stablediffusionapi/anything-v5
prompt: masterpiece, best quality, highres, game cg, 1girl, solo, {night}, {starry
  sky}, beach, beautiful detailed sky, {extremely detailed background:1.2}, mature,
  {surtr_arknights-${model_steps}:1.2}, red_hair, horns, long_hair, purple_eyes, bangs,
  looking_at_viewer, bare_shoulders, hair_between_eyes, cleavage, {standing}, looking
  at viewer, {bikini:1.3}, light smile
neg_prompt: lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit,
  fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts,
  signature, watermark, username, blurry, white border
emb_dir: /tmp/tmplehrx3q8
out_dir: output/
N_repeats: 2
clip_skip: 1
bs: 1
num: 1
seed: 216371962
dtype: fp16
condition: null
ex_input: {}
save:
  save_cfg: true
  image_type: png
  quality: 95
offload: null
vae_optimize:
  tiling: true
  slicing: false
interface:
- _target_: hcpdiff.vis.DiskInterface
  show_steps: 0
  save_root: ${output_dir}
infer_args:
  width: 512
  height: 768
  guidance_scale: 7.5
  num_inference_steps: 30
new_components:
  scheduler:
    _target_: diffusers.EulerAncestralDiscreteScheduler
    beta_start: 0.00085
    beta_end: 0.012
    beta_schedule: scaled_linear
merge:
  alpha: 0.85
  group1:
    type: unet
    base_model_alpha: 1.0
    lora:
    - path: ${.....exp_dir}/ckpts/unet-${.....model_steps}.safetensors
      alpha: ${....alpha}
      layers: all
    part: null
  group2:
    type: TE
    base_model_alpha: 1.0
    lora:
    - path: ${.....exp_dir}/ckpts/text_encoder-${.....model_steps}.safetensors
      alpha: ${....alpha}
      layers: all
    part: null
exp_dir: runs/amiya_arknights
model_steps: 500
output_dir: output/xx
